# Art processing configuration
input_dir: "input"
output_dir: "output"
output_file: "art_states.bin"

# CLIP model settings
clip_model: "openai/clip-vit-base-patch32"

# MiDaS depth estimation
depth:
  model: "DPT_Large"

# Point sampling
sampling:
  num_points: 8000
  method: "uniform"

# Morph ordering
ordering:
  method: "greedy_nearest_neighbor"
  metric: "cosine"

# Binary format
binary:
  version: 2
  endian: "little"

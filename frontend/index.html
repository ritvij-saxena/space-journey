<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Journey — Generative Cosmos</title>
    <link rel="stylesheet" href="./src/styles.css">
</head>
<body>
    <!-- Start overlay - required for audio autoplay -->
    <div id="start-overlay">
        <div id="start-content">
            <h1>Space Journey</h1>
            <p>A voyage through the cosmos</p>
            <button id="start-button">Begin Journey</button>
            <p class="hint">Audio: Marconi Union - Weightless</p>
        </div>
    </div>

    <div id="container">
        <canvas id="canvas"></canvas>
    </div>

    <!-- YouTube Audio Player (hidden) -->
    <div id="youtube-player-container" style="position:absolute;left:-9999px;width:1px;height:1px;overflow:hidden;">
        <div id="youtube-player"></div>
    </div>

    <!-- Audio control hint -->
    <div id="audio-hint">Space: Play/Pause | M: Mute | ↑↓: Volume</div>

    <!-- Journey waypoint label -->
    <div id="journey-label"></div>

    <!-- Fullscreen button -->
    <button id="fullscreen-btn">FULLSCREEN</button>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script type="module" src="./src/main.js"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () =>
          navigator.serviceWorker.register('./sw.js').catch(() => {})
        );
      }
    </script>
</body>
</html>
